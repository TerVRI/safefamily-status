#
# Upptime status page deploy — publishes to gh-pages for status.safefamily.ie
# Docs: docs/operations/upptime-status-page-runbook.md

name: Static Site CI
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/site.yml'
      - '.upptimerc.yml'
      - 'assets/**'
      - 'history/**'
  schedule:
    - cron: '0 1 * * *'
  repository_dispatch:
    types: [static_site]
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-upptime-site
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    name: Build and deploy site
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Generate site
        uses: upptime/uptime-monitor@v1.42.6
        with:
          command: site
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          CYPRESS_INSTALL_BINARY: 0
      - name: GitHub Pages Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: site/status-page/__sapper__/export/
          force_orphan: false
          user_name: Upptime Bot
          user_email: 73812536+upptime-bot@users.noreply.github.com
          cname: status.safefamily.ie
