#
# Upptime uptime checks — config in .upptimerc.yml
# Docs: docs/operations/upptime-status-page-runbook.md

name: Uptime CI
on:
  schedule:
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/uptime.yml'
      - '.upptimerc.yml'

concurrency:
  group: ${{ github.repository }}-upptime
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Check endpoint status
        uses: upptime/uptime-monitor@v1.42.6
        with:
          command: update
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
