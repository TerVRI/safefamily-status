#
# Upptime daily response-time aggregation — config in .upptimerc.yml

name: Response Time CI
on:
  schedule:
    - cron: '0 23 * * *'
  repository_dispatch:
    types: [response_time]
  workflow_dispatch:

concurrency:
  group: ${{ github.repository }}-upptime
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Update response times
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GH_PAT || github.token }}
      - name: Update response time
        uses: upptime/uptime-monitor@v1.42.6
        with:
          command: response-time
        env:
          GH_PAT: ${{ secrets.GH_PAT || github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
